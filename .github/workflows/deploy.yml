name: Deploy to Github Pages

on:
    schedule:
        - cron: "0 */2 * * *"
    workflow_dispatch:
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        permissions:
            # Give the default GITHUB_TOKEN write permission to commit and push the
            # added or changed files to the repository.
            contents: write

        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Cache Hugo resources
              uses: actions/cache@v6
              env:
                  cache-name: cache-hugo-resources
              with:
                  path: resources
                  key: ${{ env.cache-name }}

            - name: Setup Node.js
              uses: actions/setup-node@v7
              with:
                  node-version: "24"

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: latest

            - name: Build Editor
              run: |
                  cd editor
                  pnpm install
                  pnpm build

            - uses: actions/setup-go@v7
              with:
                  go-version: "^1.17.0"
            - run: go version

            - name: Setup Hugo
              uses: peaceiris/actions-hugo@v3
              with:
                  hugo-version: "0.140.2"
                  extended: true

            - name: Build
              run: hugo --minify --gc

            - name: Deploy 🚀
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  branch: gh-pages
                  folder: public
                  clean: true
                  single-commit: true
